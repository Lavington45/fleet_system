<!DOCTYPE html>
<html>

<head>
<title>Trip Reports</title>
</head>

<body>

<h2>Trip History</h2>

<table border="1">

<tr>

<th>Vehicle</th>
<th>Start</th>
<th>End</th>
<th>Distance</th>

</tr>

{% for t in trips %}

<tr>

<td>{{t[1]}}</td>
<td>{{t[2]}}</td>
<td>{{t[3]}}</td>
<td>{{t[4]}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
